<!DOCTYPE html>
<html class="light" lang="id">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAP - Daftar Akun Masyarakat</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    "colors": {
                        "primary": "#001360",
                        "on-primary": "#ffffff",
                        "surface": "#fcf9f8",
                        "background": "#fcf9f8",
                        "on-surface": "#1c1b1b",
                        "outline-variant": "#c5c5d5",
                        "surface-container-low": "#f6f3f2"
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #fdf9f3;
        }
    </style>
</head>
<body class="bg-background flex items-center justify-center min-h-screen p-4">
    <div class="w-full max-w-xl bg-white border border-outline-variant rounded-2xl shadow-xl p-6 sm:p-8">
        <div class="text-center mb-6">
            <a href="index.html" class="inline-flex bg-primary/10 p-2 rounded-xl mb-3 w-16 h-16 items-center justify-center border border-primary/20 hover:bg-primary/20 transition">
                <img src="sigap.png" alt="Logo SIGAP" class="w-full h-full object-contain" onerror="this.src='sigap.jpg'">
            </a>
            <h2 class="text-2xl font-bold text-on-surface tracking-tight">Daftar Akun SIGAP</h2>
            <p class="text-sm text-on-surface-variant mt-1">Lengkapi data diri Anda untuk mulai melaporkan aduan infrastruktur.</p>
        </div>

        <form onsubmit="handleRegister(event)" class="space-y-4">
            <!-- CRITICAL DOM ORDER FOR JS INDEXING -->
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Nama Lengkap</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">person</span>
                        <!-- Input Index 0 -->
                        <input type="text" required placeholder="Budi Santoso" class="w-full bg-white border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">NIK (KTP)</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">badge</span>
                        <!-- Input Index 1 -->
                        <input type="text" required maxlength="16" placeholder="3573xxxxxxxxxxxx" class="w-full bg-white border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition font-mono tracking-wider">
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Alamat Email</label>
                <div class="relative">
                    <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">mail</span>
                    <!-- Input Index 2 -->
                    <input type="email" required placeholder="budi.santoso@gmail.com" class="w-full bg-white border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Kata Sandi</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">lock</span>
                        <input type="password" id="password" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" class="w-full bg-white border border-outline-variant rounded-lg pl-10 pr-10 py-2.5 text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                        <button type="button" id="togglePassword" class="absolute right-3 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition">
                            <span class="material-symbols-outlined text-sm" id="eyeIcon">visibility</span>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-on-surface-variant uppercase tracking-wider mb-2">Konfirmasi Sandi</label>
                    <div class="relative">
                        <span class="absolute left-3 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline">verified_user</span>
                        <input type="password" id="confirmPassword" required placeholder="â€¢â€¢â€¢â€¢â€¢â€¢â€¢â€¢" class="w-full bg-white border border-outline-variant rounded-lg pl-10 pr-4 py-2.5 text-sm text-on-surface focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition">
                    </div>
                </div>
            </div>

            <div class="flex items-start pt-1">
                <input type="checkbox" required id="agree" class="rounded border-outline-variant text-primary focus:ring-primary h-4 w-4 mt-0.5 cursor-pointer">
                <label for="agree" class="ml-2 text-xs text-on-surface-variant cursor-pointer select-none leading-normal">
                    Saya menyatakan bahwa data yang saya masukkan adalah benar dan siap mematuhi <a href="#" class="text-primary font-bold hover:underline">Syarat &amp; Ketentuan</a> penggunaan platform SIGAP.
                </label>
            </div>

            <div class="pt-2">
                <button type="submit" id="btnRegister" class="w-full bg-primary text-on-primary font-bold py-3 px-4 rounded-lg text-sm transition shadow-lg hover:opacity-90 flex items-center justify-center gap-2 active:scale-[0.98]">
                    <span class="material-symbols-outlined text-sm">person_add</span> Buat Akun Baru
                </button>
            </div>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-outline-variant text-xs text-on-surface-variant">
            Sudah memiliki akun? <a href="login-masyarakat.html" class="text-primary font-bold hover:underline">Masuk di sini</a>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
