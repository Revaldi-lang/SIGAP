<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAP - Daftar Akun Masyarakat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 font-sans flex items-center justify-center min-h-screen p-4 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-900/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-red-900/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-xl bg-slate-900/80 backdrop-blur-md rounded-2xl border border-slate-800 shadow-2xl overflow-hidden p-6 sm:p-8 z-10 my-4">
        
        <div class="text-center mb-6">
            <div class="inline-flex bg-slate-950 p-2 rounded-xl mb-3 shadow-lg shadow-blue-500/10 w-16 h-16 items-center justify-center border border-slate-800">
                <img src="sigap.jpg" alt="Logo SIGAP" class="w-full h-full object-contain rounded-lg" onerror="this.src='sigap.png'">
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Daftar Akun SIGAP</h2>
            <p class="text-sm text-slate-400 mt-1">Lengkapi data diri Anda untuk mulai melaporkan aduan infrastruktur.</p>
        </div>

        <form onsubmit="handleRegister(event)" class="space-y-4">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Nama Lengkap</label>
                    <div class="relative">
                        <input type="text" required placeholder="Budi Santoso" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                        <i class="fa-solid fa-user absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">NIK (KTP)</label>
                    <div class="relative">
                        <input type="text" required maxlength="16" placeholder="3573xxxxxxxxxxxx" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition font-mono tracking-wider">
                        <i class="fa-solid fa-id-card absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                    </div>
                </div>
            </div>

            <div>
                <label class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-1.5">Alamat Email</label>
                <div class="relative">
                    <input type="email" required placeholder="budi.santoso@gmail.com" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                    <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Kata Sandi</label>
                    <div class="relative">
                        <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-10 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                        <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                        <button type="button" id="togglePassword" class="absolute right-3 top-3 text-slate-500 hover:text-slate-300 transition">
                            <i class="fa-solid fa-eye text-xs" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Konfirmasi Sandi</label>
                    <div class="relative">
                        <input type="password" id="confirmPassword" required placeholder="••••••••" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                        <i class="fa-solid fa-shield-halved absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                    </div>
                </div>
            </div>

            <div class="flex items-start pt-1">
                <input type="checkbox" required id="agree" class="rounded bg-slate-950 border-slate-800 text-blue-600 focus:ring-blue-500 h-4 w-4 mt-0.5 cursor-pointer">
                <label for="agree" class="ml-2 text-xs text-slate-400 cursor-pointer select-none leading-normal">
                    Saya menyatakan bahwa data yang saya masukkan adalah benar dan siap mematuhi <a href="#" class="text-blue-400 hover:underline">Syarat & Ketentuan</a> penggunaan platform SIGAP.
                </label>
            </div>

            <div class="pt-2">
                <button type="submit" id="btnRegister" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl text-sm transition shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-user-plus"></i> Buat Akun Baru
                </button>
            </div>
        </form>

        <div class="text-center mt-6 pt-4 border-t border-slate-800/60 text-sm text-slate-400">
            Sudah memiliki akun? <a href="login.html" class="text-blue-400 font-medium hover:underline">Masuk di sini</a>
        </div>
    </div>

    <script>
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const eyeIcon = document.getElementById('eyeIcon');

        if (togglePassword) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                confirmPasswordInput.setAttribute('type', type); 
                
                if (type === 'text') {
                    eyeIcon.classList.remove('fa-eye');
                    eyeIcon.classList.add('fa-eye-slash');
                } else {
                    eyeIcon.classList.remove('fa-eye-slash');
                    eyeIcon.classList.add('fa-eye');
                }
            });
        }

        function handleRegister(event) {
            event.preventDefault(); 

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                alert("Gagal! Konfirmasi kata sandi tidak cocok. Silakan periksa kembali.");
                return;
            }

            const btn = document.getElementById('btnRegister');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses Pendaftaran...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            setTimeout(() => {
                alert("Pendaftaran Berhasil!\nAkun Anda telah didaftarkan ke sistem SIGAP. Silakan masuk menggunakan email Anda.");
                window.location.href = 'login.html'; 
            }, 1500);
        }
    </script>
</body>
</html>
