<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGAP - Masuk Akun Masyarakat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 font-sans flex items-center justify-center min-h-screen p-4 relative overflow-x-hidden">

    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-900/20 rounded-full blur-3xl pointer-events-none"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-emerald-900/10 rounded-full blur-3xl pointer-events-none"></div>

    <div class="w-full max-w-md bg-slate-900/80 backdrop-blur-md rounded-2xl border border-slate-800 shadow-2xl overflow-hidden p-6 sm:p-8 z-10 my-4">
        
        <div class="text-center mb-6">
            <div class="inline-flex bg-slate-950 p-2 rounded-xl mb-3 shadow-lg shadow-blue-500/10 w-16 h-16 items-center justify-center border border-slate-800">
                <img src="sigap.jpg" alt="Logo SIGAP" class="w-full h-full object-contain rounded-lg" onerror="this.src='sigap.png'">
            </div>
            <h2 class="text-2xl font-bold text-white tracking-tight">Portal Masyarakat</h2>
            <p class="text-sm text-slate-400 mt-1">Silakan masuk untuk membuat aduan atau melacak berkas laporan Anda.</p>
        </div>

        <form onsubmit="handleLoginMasyarakat(event)" class="space-y-4">
            
            <div>
                <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider mb-1.5">Alamat Email</label>
                <div class="relative">
                    <input type="email" required placeholder="budi.santoso@gmail.com" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-4 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                    <i class="fa-solid fa-envelope absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-1.5">
                    <label class="block text-xs font-bold text-slate-300 uppercase tracking-wider">Kata Sandi</label>
                    <a href="#" onclick="alert('Fitur pemulihan sandi masyarakat sedang disinkronkan.')" class="text-xs text-blue-400 hover:underline">Lupa Sandi?</a>
                </div>
                <div class="relative">
                    <input type="password" id="password" required placeholder="••••••••" class="w-full bg-slate-950/60 border border-slate-800 rounded-xl pl-10 pr-10 py-2.5 text-sm text-white placeholder-slate-600 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 transition">
                    <i class="fa-solid fa-lock absolute left-3.5 top-3.5 text-slate-600 text-xs"></i>
                    <button type="button" id="togglePassword" class="absolute right-3 top-3 text-slate-500 hover:text-slate-300 transition">
                        <i class="fa-solid fa-eye text-xs" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div class="flex items-center pt-1">
                <input type="checkbox" id="remember" class="rounded bg-slate-950 border-slate-800 text-blue-600 focus:ring-blue-500 h-4 w-4 cursor-pointer">
                <label for="remember" class="ml-2 text-xs text-slate-400 cursor-pointer select-none">
                    Ingat sesi masuk saya di perangkat ini
                </label>
            </div>

            <div class="pt-2">
                <button type="submit" id="btnLogin" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl text-sm transition shadow-lg shadow-blue-500/20 flex items-center justify-center gap-2">
                    Masuk Sekarang <i class="fa-solid fa-arrow-right-to-bracket text-xs"></i>
                </button>
            </div>
        </form>

        <div class="space-y-3 mt-6 pt-4 border-t border-slate-800/60 text-center text-sm">
            <div class="text-slate-400">
                Belum memiliki akun? <a href="register.html" class="text-blue-400 font-medium hover:underline">Daftar di sini</a>
            </div>
            <div>
                <a href="index.html" class="text-xs text-slate-500 hover:text-slate-300 transition flex items-center justify-center gap-1.5">
                    <i class="fa-solid fa-arrow-left text-[10px]"></i> Kembali ke Halaman Utama
                </a>
            </div>
        </div>
    </div>

    <script>
        // 1. Fitur Toggle Mengintip Kata Sandi
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const eyeIcon = document.getElementById('eyeIcon');

        if (togglePassword) {
            togglePassword.addEventListener('click', function () {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                
                if (type === 'text') {
                    eyeIcon.className = "fa-solid fa-eye-slash text-xs";
                } else {
                    eyeIcon.className = "fa-solid fa-eye text-xs";
                }
            });
        }

        // 2. Penangan Submit Login Masyarakat
        function handleLoginMasyarakat(event) {
            event.preventDefault();

            const btn = document.getElementById('btnLogin');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mengautentikasi...';
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            btn.disabled = true;

            // Simulasi pengecekan akun / delay jaringan selama 1.2 detik
            setTimeout(() => {
                alert("Login Sukses!\nSelamat datang di platform SIGAP. Anda sekarang dapat mengakses peta dan membuat laporan aduan.");
                // Setelah login sukses, masyarakat diarahkan langsung ke halaman peta dampak atau form laporan
                window.location.href = 'peta.html'; 
            }, 1200);
        }
    </script>
</body>
</html>
