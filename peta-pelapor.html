<body class="text-on-surface">
    <!-- Sidebar Warga -->
    <aside id="sidebar" class="fixed left-0 top-0 h-full w-64 bg-surface-container-low border-r border-outline-variant flex flex-col p-stack-md z-50 transition-transform duration-300 -translate-x-full md:translate-x-0">
        <div class="flex items-center gap-3 px-4 py-6 mb-8">
            <div class="bg-primary/10 p-2 rounded-xl border border-primary/20 flex items-center justify-center">
                <img alt="SIGAP Logo" class="h-8 w-auto object-contain" src="sigap.png" onerror="this.src='sigap.jpg'"/>
            </div>
            <span class="font-headline-sm text-headline-md font-bold text-primary">SIGAP</span>
        </div>
        <!-- User Profile Anchor -->
        <div class="px-4 mb-8">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center text-on-primary-container">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <div>
                    <h3 class="font-label-md text-label-md font-bold text-on-surface text-sm">Budi Santoso</h3>
                    <p class="text-[10px] text-on-surface-variant tracking-wider uppercase font-semibold">Masyarakat</p>
                </div>
            </div>
        </div>
        <!-- Main Navigation -->
        <nav class="flex-grow space-y-1">
            <a class="flex items-center gap-stack-md text-on-surface-variant px-4 py-3 hover:bg-surface-variant rounded-lg transition-colors" href="dashboard-pelapor.html">
                <span class="material-symbols-outlined">dashboard</span>
                <span class="font-label-md text-label-md">Dashboard</span>
            </a>
            <a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-variant px-4 py-3 rounded-lg transition-colors" href="buat-laporan.html">
                <span class="material-symbols-outlined">description</span>
                <span class="font-label-md text-label-md">Buat Laporan</span>
            </a>
            <a class="flex items-center gap-stack-md bg-primary-container text-white font-bold rounded-lg px-4 py-3 transition-colors" href="peta-pelapor.html">
                <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">map</span>
                <span class="font-label-md text-label-md">Peta Dampak</span>
            </a>
            <a class="flex items-center gap-stack-md text-on-surface-variant hover:bg-surface-variant px-4 py-3 rounded-lg transition-colors" href="pengaturan-profil-pelapor.html">
                <span class="material-symbols-outlined">settings</span>
                <span class="font-label-md text-label-md">Pengaturan</span>
            </a>
        </nav>
        <!-- Footer Nav -->
        <div class="border-t border-outline-variant pt-4 space-y-1">
            <a class="flex items-center gap-stack-md text-error hover:bg-error-container/20 px-4 py-3 rounded-lg transition-colors" href="login-masyarakat.html">
                <span class="material-symbols-outlined">logout</span>
                <span class="font-label-md text-label-md">Keluar</span>
            </a>
        </div>

    <!-- Main Content Canvas -->
    <main class="ml-0 md:ml-64 min-h-screen p-6 max-w-[1440px] flex flex-col">
        <!-- Header -->
        <header class="flex justify-between items-center mb-6">
            <button id="mobile-menu-btn" class="md:hidden p-2 text-primary hover:bg-primary/5 rounded-lg flex items-center justify-center mr-2 shrink-0">
                <i class="fa-solid fa-bars text-xl"></i>
            </button>
            <div>
                <h1 class="font-display-lg text-display-lg text-primary mb-1">Peta Sebaran Laporan Warga</h1>
                <p class="font-body-md text-on-surface-variant">Lihat sebaran spasial lokasi aduan infrastruktur dari masyarakat luas secara real-time.</p>
            </div>
        </header>

        <!-- Filter Map Panel -->
        <section class="bg-surface-container-lowest p-4 border border-outline-variant rounded-xl mb-6 flex flex-wrap gap-6 items-center shadow-sm">
            <span class="font-label-sm text-label-sm uppercase tracking-wider text-on-surface-variant font-bold">Filter Status:</span>
            <div class="flex flex-wrap gap-4">
                <label class="flex items-center gap-2 cursor-pointer text-xs font-semibold">
                    <input id="filter-baru" type="checkbox" checked class="rounded border-outline-variant text-error focus:ring-error h-4 w-4">
                    <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-[#ef4444]"></span> Baru Masuk</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-xs font-semibold">
                    <input id="filter-proses" type="checkbox" checked class="rounded border-outline-variant text-tertiary focus:ring-tertiary h-4 w-4">
                    <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-[#f59e0b]"></span> Sedang Diproses</span>
                </label>
                <label class="flex items-center gap-2 cursor-pointer text-xs font-semibold">
                    <input id="filter-selesai" type="checkbox" checked class="rounded border-outline-variant text-green-600 focus:ring-green-600 h-4 w-4">
                    <span class="inline-flex items-center gap-1.5"><span class="w-2.5 h-2.5 rounded-full bg-[#22c55e]"></span> Selesai Perbaikan</span>
                </label>
            </div>
        </section>

        <!-- Interactive Map Container -->
        <section class="flex-grow bg-surface-container-lowest border border-outline-variant rounded-2xl overflow-hidden relative shadow-sm min-h-[500px]">
            <div id="mapPelapor" class="w-full h-full min-h-[500px] z-0"></div>
        </section>
    </main>

    <script src="assets/js/script.js"></script>
